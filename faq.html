<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Section</title>
<link rel="stylesheet" href="src/css/main.css">
<style>
body {
  margin: 0;
  background: #eee;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100dvh;
  font-family: sans-serif;
}
.cta-card {
    max-width: 1200px;
    width: 90%;
    height: 362px;
    position: relative;
    overflow: hidden;
    border-radius: 1.5rem;
    background: var(--color-primary);
    color: white;
    padding: 2.5rem 2rem;
    box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
    display: flex;
    justify-content:space-between;
    align-items: center;
    font-family: var(--font-primary);
}
.circles {
    position: absolute;
    right: -150px;
    top: 50%;
    transform: translateY(-50%);
}
.circle {
    position: absolute;
    border-radius: 50%;
    top: 50%;
    right: 0;
    transform: translateY(-50%);
}

.c1 {
    width: 600px;
    height: 600px;
    background: #8C670099;
    z-index: 1;
}

.c2 {
    width: 455px;
    height: 455px;
    background: #E5AA00;
    z-index: 2;
}

.c3 {
    width: 370px;
    height: 370px;
    background: var(--color-accent);
    z-index: 3;
}

.cta-content {
    position: relative;
    z-index: 10;
    width: 635px;
    height: 212px;
    border-radius: 35.5px;
    margin-bottom: 3rem;
}
.cta-title {
    /* width: 381px; */
    height: 49px;
    font-size: 40px;
    font-weight: 800;
    letter-spacing: var(--letter-spacing-normal);
    margin-bottom: 1rem;
}
.cta-description {
    /* width: 635px; */
    height: 76px;
    color: #e2e8f0;
    font-size: 20px;
    font-weight: 400;
    line-height: 38px;
    letter-spacing: 1px;
    font-style:normal;
    margin-top: 1.8rem;
}
.btn-cta {
   margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: white;
    color: var(--color-primary);
    font-weight: 700;
    width: 191px;
    height: 49px;
    border-radius: 35.5px;
    text-decoration: none;
    transition: all 0.25s ease;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
    font-size: 16px;
    font-weight: var(--font-weight-extraBold);
    letter-spacing: var(--letter-spacing-normal);
    border: none;
    cursor: pointer;
    font-family: inherit;
}

.btn-cta:hover {
    background: #fef9e3;
    transform: translateY(-2px);
    box-shadow: 0 12px 20px -12px rgba(0, 0, 0, 0.2);
}
@media(max-width:425px){
  .cta-card{
    width: 343px;
  height: 724px;
  background:  var(--color-primary);
  border-radius: 30px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow: hidden;
  color: white;
  text-align: center;
  }
.contact-box {
  width: 343px;
  height: 100dvh;
  background:  var(--color-primary);
  border-radius: 30px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow: hidden;
  color: white;
  text-align: center;
}

.content {
  padding: 30px 20px;
}

.cta-title{
  font-size: 24px;
  margin-top: 50px;
}

.cta-description {
  font-size: 14px;
  line-height: 23px;
  width: 315px;
  margin: 0 auto;
}

.btn-cta{
  margin: 20px auto;
  font-size: 13px !important;
  width: 156px;
  height: 37px;
}

/* shapes */
.circles {
  position: relative;
  height: 50%;
  right: 150px;
  transform: translateY(-70%)
}
/* .circles {
    position: absolute;
    right: -150px;
    top: 50%;
    transform: translateY(-50%);
} */
.circle {
  position: absolute;
  width: 200%;
  left: -50%;
  border-radius: 50%;
}

.c1 {
  width: 678px;
  height: 678px;
  left: -190px;
  top: 220px;
  background: #5a6426;
}

.c2 {
  width: 485px;
  height: 485px;
  left: -90px;
  /* transform: rotate(-90deg); */
  top: 200px;
  background: #d9a126;
}

.c3 {
  width: 410px;
  height: 410px;
  left: -50px;
  top: 250px;
  /* transform: rotate(-90deg); */
  background: #f2b632;
}
}
</style>
</head>

<body>

<div class="cta-card">

  <div class="cta-content">
    <h1 class="cta-title">Let’s Get In Touch</h1>
    <p class='cta-description'>
      We’re ready to turn your ideas into powerful digital experiences.
      Let’s start building your brand today
    </p>
    <button class='btn-cta'>Start Your Project</button>
  </div>

  <div class="circles">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
  </div>

</div>

</body>
</html>
